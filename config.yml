# ╔══════════════════════════════════════════════════════════════════╗
# ║                  CubeSTAFF v4.0 - config.yml                   ║
# ║           اعدادات كاملة ومتكاملة - عدّل ما تشاء               ║
# ╚══════════════════════════════════════════════════════════════════╝

# ──────────────────────────────────────────
#              معلومات الخادم
# ──────────────────────────────────────────
server-name: "CubeMC"
server-icon-url: ""   # URL لأيقونة الخادم (تُستخدم في الإيمبدات)

# ──────────────────────────────────────────
#         رتب الإدارة (مرتبة من الأعلى للأدنى)
#   الرتبة الأولى هي الأعلى، الأخيرة هي الأدنى
#   عند تنزيل رتبة → تُمنح الرتبة التي تحتها مباشرة
#   عند تنزيل أدنى رتبة → طرد نهائي
# ──────────────────────────────────────────
staff-ranks:
  - "owner"
  - "manager"
  - "sradmin"
  - "admin"
  - "srmod"
  - "mod"
  - "helper"

# أسماء العرض (تُستخدم في الإيمبدات والرسائل)
rank-display-names:
  owner:   "👑 المالك"
  manager: "⚡ المدير"
  sradmin: "🔥 كبير الأدمن"
  admin:   "🛡️ أدمن"
  srmod:   "⭐ كبير المشرف"
  mod:     "🔨 مشرف"
  helper:  "💙 مساعد"

# ألوان الرتب في الإيمبدات (Hex)
rank-colors:
  owner:   "FFD700"
  manager: "FF4500"
  sradmin: "FF6347"
  admin:   "7289DA"
  srmod:   "9B59B6"
  mod:     "2ECC71"
  helper:  "3498DB"

# ──────────────────────────────────────────
#    الساعات المفروضة أسبوعياً (بالساعات)
#   من يفشل → تنزيل رتبة (أو طرد إن كان أدنى رتبة)
# ──────────────────────────────────────────
required-weekly-hours:
  owner:   0      # لا يُحاسَب
  manager: 0      # لا يُحاسَب
  sradmin: 10
  admin:   8
  srmod:   6
  mod:     5
  helper:  4

# ──────────────────────────────────────────
#              نظام التحذيرات
# ──────────────────────────────────────────
warnings:
  max-warnings: 4                # عند الوصول لهذا الرقم → طرد من الإدارة
  warn-duration-days: 15         # مدة التحذير بالأيام قبل انتهائه تلقائياً
  # من يملك صلاحية منح التحذيرات؟ (صلاحية LuckPerms)
  warn-permission: "cubestaff.warn"

# ──────────────────────────────────────────
#    تنبيه غياب الأدمن (رسالة في خاص اللاعبين)
# ──────────────────────────────────────────
no-admin-alert:
  enabled: true
  player-threshold: 20           # يُفعَّل عندما يتجاوز عدد اللاعبين هذا الرقم
  cooldown-minutes: 30           # الحد الأدنى بين كل تنبيهين (بالدقائق)
  # الرسالة التي تُرسل للاعبين (يدعم &كودات الألوان)
  message: "&c⚠ &fلا يوجد أي إداري متصل حالياً. تحلى بالصبر!"

# ──────────────────────────────────────────
#     عرض Stats بعد الدخول بدقيقتين
# ──────────────────────────────────────────
login-stats:
  enabled: true
  delay-seconds: 120             # 120 ثانية = دقيقتان

# ──────────────────────────────────────────
#         إشعار غياب يوم كامل
# ──────────────────────────────────────────
absence-alert:
  enabled: true
  # الرسالة التي تُرسل في Discord DM
  message: "لم تتصل بالخادم منذ أكثر من 24 ساعة. حضورك مهم لفريق الإدارة! 💙"

# ──────────────────────────────────────────
#         كشف الـ AFK
# ──────────────────────────────────────────
afk:
  enabled: true
  timeout-seconds: 300           # 5 دقائق بدون حركة = AFK

# ──────────────────────────────────────────
#              Discord - بوت
# ──────────────────────────────────────────
discord:
  enabled: true
  bot-token: "YOUR_BOT_TOKEN_HERE"
  # CubeDiscordLink plugin (للإرسال في الخاص)
  discord-link-plugin: "CubeDiscordLink"

# ──────────────────────────────────────────
#           Webhooks (روابط القنوات)
# ──────────────────────────────────────────
webhooks:
  # قناة سجل عام لكل الأحداث
  general-log: ""

  # قناة التحذيرات
  warnings: ""

  # قناة الإجازات
  vacations: ""

  # قناة شات الإدارة
  staff-chat: ""

  # قناة إحصائيات يومية (Top Staff اليومي)
  daily-top: ""

  # قناة تغييرات الرتب
  rank-changes: ""

  # قناة الطرد من الإدارة
  demotions: ""

# ──────────────────────────────────────────
#         Top Staff اليومي (Webhook)
# ──────────────────────────────────────────
daily-top:
  enabled: true
  hour: 20                       # ساعة الإرسال (0-23)
  minute: 0                      # دقيقة الإرسال
  top-count: 10                  # عدد الإداريين في القائمة

# ──────────────────────────────────────────
#           تصميم الإيمبدات
# ──────────────────────────────────────────
embed-design:
  # ألوان حسب نوع الإيمبد (Hex بدون #)
  colors:
    success:   "2ECC71"   # أخضر
    warning:   "E67E22"   # برتقالي
    danger:    "E74C3C"   # أحمر
    info:      "3498DB"   # أزرق
    purple:    "9B59B6"   # بنفسجي
    gold:      "F1C40F"   # ذهبي
    staff-chat:"5865F2"   # أزرق Discord

  footer-text: "CubeSTAFF • {server} • {time}"
  footer-icon-url: ""
  show-timestamp: true

# ──────────────────────────────────────────
#        إشعارات يمكن تفعيل/تعطيل كل منها
# ──────────────────────────────────────────
notifications:
  rank-granted: true           # إشعار عند منح رتبة
  rank-removed: true           # إشعار عند إزالة رتبة
  warning-received: true       # إشعار عند تلقي تحذير
  vacation-status: true        # إشعار عند تغيير حالة الإجازة
  weekly-summary: true         # ملخص أسبوعي بالساعات والنتيجة
  absence-24h: true            # إشعار عند الغياب 24 ساعة
  no-admin-dm: true            # رسالة خاصة للاعبين عند غياب الأدمن

# ──────────────────────────────────────────
#         إعدادات الـ GUI
# ──────────────────────────────────────────
gui:
  title: "§5§l✦ §d§lإدارة الخادم §5§l✦"
  rows: 6                      # عدد صفوف الـ GUI (1-6)
  fill-empty: true             # ملء الخانات الفارغة بزجاج ملون
  fill-color: BLACK            # لون الزجاج الفارغ

# ──────────────────────────────────────────
#              شات الإدارة
# ──────────────────────────────────────────
staff-chat:
  format: "&8[&5⚡&8] &d{rank} &b{player} &8➜ &f{message}"
  # يُرسل لجميع الإداريين المتصلين + الـ webhook

# ──────────────────────────────────────────
#      رسائل قابلة للتخصيص (يدعم & للألوان)
# ──────────────────────────────────────────
messages:
  no-permission:   "&c✗ &7ليس لديك صلاحية لاستخدام هذا الأمر!"
  player-only:     "&c✗ &7هذا الأمر للاعبين فقط!"
  player-offline:  "&c✗ &7اللاعب غير متصل!"
  not-staff:       "&c✗ &7هذا اللاعب ليس من الإدارة!"
  reload-success:  "&a✓ &7تم إعادة تحميل الإعدادات بنجاح!"

  # رسالة الطرد (تُعرض للاعب المطرود)
  demote-kick-message: |
    &c&l✦ تم إيقافك عن فريق الإدارة ✦
    &7السبب: &fوصلت للحد الأقصى من التحذيرات
    &7تواصل مع الإدارة العليا للاستفسار
